<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff5f7;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Apple SD Gothic Neo',sans-serif;overflow:hidden}
#wrap{position:relative;width:340px}
#score-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 4px;font-size:13px;color:#d4537e}
#score-bar span{font-weight:700;color:#c03060}
#timer-bar-wrap{width:100%;height:6px;background:rgba(212,83,126,0.15);border-radius:99px;margin-bottom:6px;overflow:hidden}
#timer-bar{height:6px;border-radius:99px;background:linear-gradient(90deg,#f9a8c9,#ff6fa8);transition:width 0.1s linear}
canvas{display:block;border-radius:24px;border:2px solid #f4c0d1;background:#fff}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:24px;background:rgba(255,245,247,0.95)}
#overlay h2{font-size:26px;color:#d4537e;margin-bottom:8px}
#overlay p{font-size:14px;color:#c080a0;margin-bottom:16px;text-align:center;line-height:1.7}
#overlay .stats{font-size:13px;color:#d4537e;margin-bottom:16px;text-align:center;line-height:1.8}
#startBtn{background:#d4537e;color:#fff;border:none;border-radius:999px;padding:12px 36px;font-size:16px;cursor:pointer;font-family:inherit;transition:transform 0.1s}
#startBtn:hover{transform:scale(1.05)}
#startBtn:active{transform:scale(0.97)}
.level-up-msg{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-size:22px;color:#d4537e;font-weight:700;pointer-events:none;opacity:0;transition:opacity 0.3s;text-shadow:0 0 8px #f9a8c9;white-space:nowrap}
</style>
</head>
<body>
<div id="wrap">
  <div id="score-bar">
    <div>점수 <span id="sc">0</span></div>
    <div>레벨 <span id="lv">1</span> / 17</div>
    <div>최고 <span id="hi">0</span></div>
  </div>
  <div id="timer-bar-wrap"><div id="timer-bar" style="width:100%"></div></div>
  <canvas id="c" width="340" height="480"></canvas>
  <div class="level-up-msg" id="lvMsg"></div>
  <div id="overlay">
    <h2>🍓 아기천사 런</h2>
    <p>디저트를 먹고 장애물을 피하세요!<br>← → 키 또는 터치로 이동<br>17단계까지 클리어하면 승리!</p>
    <div class="stats" id="endStats"></div>
    <button id="startBtn">시작하기</button>
  </div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=340,H=480;
const MAX_LEVEL=17;
const STAGE_TIME=18;
let raf,state='idle';
let score=0,hiScore=0,level=1;
let player,items,particles;
let frameCount=0,spawnRate=75,speed=2.2;
let keys={};
let timeLeft=STAGE_TIME,lastTime=0,timerActive=false;

let touchStartX=null;
canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(touchStartX===null)return;
  const dx=e.touches[0].clientX-touchStartX;
  if(Math.abs(dx)>8){player.vx=dx>0?5.5:-5.5;touchStartX=e.touches[0].clientX;}
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',()=>{player.vx=0;touchStartX=null;});
window.addEventListener('keydown',e=>{keys[e.key]=true});
window.addEventListener('keyup',e=>{keys[e.key]=false;if(!keys['ArrowLeft']&&!keys['ArrowRight'])player.vx=0;});

const DESSERTS=[
  {emoji:'🍬',pts:5,color:'#f9a8c9'},
  {emoji:'🍪',pts:8,color:'#f7c5a0'},
  {emoji:'🍰',pts:15,color:'#f4c0d1'},
  {emoji:'🍫',pts:10,color:'#c8a06a'},
  {emoji:'🧁',pts:20,color:'#f9c8e0'},
  {emoji:'🍭',pts:12,color:'#aee8d0'},
  {emoji:'🍩',pts:18,color:'#ffb3c6'},
];
const OBSTACLES=[
  {emoji:'🥦',color:'#7dc97d'},
  {emoji:'🌶️',color:'#e24b4a'},
  {emoji:'🧅',color:'#f7c5a0'},
  {emoji:'🫑',color:'#5cb85c'},
];

function initGame(){
  score=0;level=1;frameCount=0;spawnRate=75;speed=2.2;
  timeLeft=STAGE_TIME;timerActive=true;lastTime=performance.now();
  player={x:W/2,y:H-60,vx:0,bounce:0};
  items=[];particles=[];
  updateUI();updateTimerBar();
}

function getLevelSpeed(lv){return 2.2+(lv-1)*0.55;}
function getLevelSpawn(lv){return Math.max(22,75-(lv-1)*3.5|0);}
function getLevelObsRate(lv){return Math.min(0.45,0.2+(lv-1)*0.016);}

function spawnItem(){
  const isObs=Math.random()<getLevelObsRate(level);
  const x=30+Math.random()*(W-60);
  if(isObs){
    const o=OBSTACLES[Math.floor(Math.random()*OBSTACLES.length)];
    items.push({x,y:-30,r:20,type:'obs',emoji:o.emoji,color:o.color,speed:speed*0.9,wobble:Math.random()*Math.PI*2});
  } else {
    const d=DESSERTS[Math.floor(Math.random()*DESSERTS.length)];
    items.push({x,y:-30,r:18,type:'dessert',emoji:d.emoji,pts:d.pts,color:d.color,speed,wobble:Math.random()*Math.PI*2});
  }
}

// 딸기 도트 배경 (한번만 생성)
const dots=[];
for(let i=0;i<18;i++){
  dots.push({
    x:20+Math.random()*(W-40),
    y:20+Math.random()*(H-40),
    type:Math.random()<0.6?'dot':'strawberry',
    size:Math.random()<0.5?4:6,
    alpha:0.12+Math.random()*0.1
  });
}

function drawBg(){
  // 흰 배경
  ctx.fillStyle='#fff';
  ctx.fillRect(0,0,W,H);

  // 도트 + 딸기 패턴
  dots.forEach(d=>{
    ctx.save();ctx.globalAlpha=d.alpha;
    if(d.type==='dot'){
      ctx.beginPath();ctx.arc(d.x,d.y,d.size,0,Math.PI*2);
      ctx.fillStyle='#f9a8c9';ctx.fill();
    } else {
      drawSmallStrawberry(d.x,d.y,d.size*1.8);
    }
    ctx.restore();
  });

  // 바닥선
  ctx.beginPath();ctx.moveTo(0,H-30);ctx.lineTo(W,H-30);
  ctx.strokeStyle='rgba(212,83,126,0.15)';ctx.lineWidth=1;ctx.stroke();
}

function drawSmallStrawberry(x,y,r){
  // 딸기 몸통
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle='#e83060';ctx.fill();
  // 씨앗
  ctx.fillStyle='rgba(255,255,255,0.7)';
  [[-0.3,-0.2],[0.3,-0.2],[0,0.2]].forEach(([dx,dy])=>{
    ctx.beginPath();ctx.arc(x+dx*r*1.2,y+dy*r*1.2,r*0.18,0,Math.PI*2);ctx.fill();
  });
  // 잎
  ctx.fillStyle='#2a8a20';
  ctx.beginPath();ctx.ellipse(x-r*0.3,y-r,r*0.3,r*0.15,Math.PI*-0.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+r*0.3,y-r,r*0.3,r*0.15,Math.PI*0.5,0,Math.PI*2);ctx.fill();
}

// 아기천사 (작게: s=스케일)
function drawBaby(x,y,bounce){
  const s=0.62; // 크기 축소
  const by=Math.sin(bounce)*2.5;
  const cx=x, cy=y+by;

  ctx.save();
  ctx.translate(cx,cy);
  ctx.scale(s,s);
  const bx=0,bcy=0;

  // 후광
  ctx.save();ctx.globalAlpha=0.7;
  ctx.beginPath();ctx.ellipse(bx,bcy-52,14,4,0,0,Math.PI*2);
  ctx.strokeStyle='#ffd700';ctx.lineWidth=3;ctx.stroke();
  ctx.restore();

  // 날개
  ctx.save();ctx.globalAlpha=0.75;
  ctx.beginPath();
  ctx.moveTo(bx-10,bcy-10);
  ctx.bezierCurveTo(bx-38,bcy-22,bx-42,bcy+2,bx-18,bcy+4);
  ctx.fillStyle='#ffe8f5';ctx.fill();
  ctx.strokeStyle='#f0c0d8';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(bx+10,bcy-10);
  ctx.bezierCurveTo(bx+38,bcy-22,bx+42,bcy+2,bx+18,bcy+4);
  ctx.fillStyle='#ffe8f5';ctx.fill();
  ctx.strokeStyle='#f0c0d8';ctx.lineWidth=1;ctx.stroke();
  ctx.restore();

  // 기저귀
  ctx.beginPath();ctx.ellipse(bx,bcy+22,13,9,0,0,Math.PI*2);
  ctx.fillStyle='#e8e0d5';ctx.fill();
  ctx.strokeStyle='#c8b8a5';ctx.lineWidth=1;ctx.stroke();

  // 몸통
  ctx.beginPath();ctx.ellipse(bx,bcy+4,15,20,0,0,Math.PI*2);
  ctx.fillStyle='#ffcfaa';ctx.fill();
  ctx.strokeStyle='#e8a880';ctx.lineWidth=1;ctx.stroke();

  // 왼팔
  ctx.beginPath();ctx.moveTo(bx-14,bcy);ctx.bezierCurveTo(bx-32,bcy-8,bx-36,bcy+8,bx-28,bcy+14);
  ctx.strokeStyle='#ffcfaa';ctx.lineWidth=8;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.arc(bx-28,bcy+14,5,0,Math.PI*2);ctx.fillStyle='#ffcfaa';ctx.fill();

  // 오른팔
  ctx.beginPath();ctx.moveTo(bx+14,bcy);ctx.bezierCurveTo(bx+32,bcy-8,bx+36,bcy+8,bx+28,bcy+14);
  ctx.strokeStyle='#ffcfaa';ctx.lineWidth=8;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.arc(bx+28,bcy+14,5,0,Math.PI*2);ctx.fillStyle='#ffcfaa';ctx.fill();

  // 왼다리
  ctx.beginPath();ctx.moveTo(bx-8,bcy+20);ctx.bezierCurveTo(bx-12,bcy+32,bx-14,bcy+38,bx-10,bcy+44);
  ctx.strokeStyle='#ffcfaa';ctx.lineWidth=9;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.ellipse(bx-10,bcy+46,6,4,0.3,0,Math.PI*2);ctx.fillStyle='#ffcfaa';ctx.fill();

  // 오른다리
  ctx.beginPath();ctx.moveTo(bx+8,bcy+20);ctx.bezierCurveTo(bx+12,bcy+32,bx+14,bcy+38,bx+10,bcy+44);
  ctx.strokeStyle='#ffcfaa';ctx.lineWidth=9;ctx.lineCap='round';ctx.stroke();
  ctx.beginPath();ctx.ellipse(bx+10,bcy+46,6,4,-0.3,0,Math.PI*2);ctx.fillStyle='#ffcfaa';ctx.fill();

  // 머리
  ctx.beginPath();ctx.arc(bx,bcy-26,20,0,Math.PI*2);
  ctx.fillStyle='#ffcfaa';ctx.fill();
  ctx.strokeStyle='#e8a880';ctx.lineWidth=1;ctx.stroke();

  // 뽀글 머리
  ctx.fillStyle='#2a1a0a';
  [[-12,-44],[-6,-47],[0,-48],[6,-47],[12,-44],[-9,-42],[9,-42],[0,-46],[-14,-40],[14,-40]].forEach(([hx,hy])=>{
    ctx.beginPath();ctx.arc(bx+hx,bcy+hy,4.5,0,Math.PI*2);ctx.fill();
  });

  // 볼터치
  ctx.save();ctx.globalAlpha=0.35;ctx.fillStyle='#ff7090';
  ctx.beginPath();ctx.ellipse(bx-14,bcy-22,6,4,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(bx+14,bcy-22,6,4,0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // 눈
  ctx.fillStyle='#2a1a0a';
  ctx.beginPath();ctx.arc(bx-7,bcy-28,2.8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(bx+7,bcy-28,2.8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(bx-6,bcy-29,1.1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(bx+8,bcy-29,1.1,0,Math.PI*2);ctx.fill();

  // 코
  ctx.beginPath();ctx.arc(bx,bcy-24,1.5,0,Math.PI*2);ctx.fillStyle='#e8a070';ctx.fill();

  // 입
  ctx.beginPath();ctx.arc(bx,bcy-20,5,0.15,Math.PI-0.15);
  ctx.strokeStyle='#c07060';ctx.lineWidth=1.8;ctx.stroke();

  // 뿔테 안경
  ctx.strokeStyle='#1a0a0a';ctx.lineWidth=2.2;
  ctx.beginPath();ctx.roundRect(bx-16,bcy-33,13,10,3);ctx.stroke();
  ctx.beginPath();ctx.roundRect(bx+3,bcy-33,13,10,3);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx-3,bcy-28);ctx.lineTo(bx+3,bcy-28);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx-16,bcy-28);ctx.lineTo(bx-20,bcy-26);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx+16,bcy-28);ctx.lineTo(bx+20,bcy-26);ctx.stroke();

  // 딸기 모자
  ctx.beginPath();ctx.ellipse(bx,bcy-43,18,5,0,0,Math.PI*2);
  ctx.fillStyle='#e02850';ctx.fill();
  ctx.beginPath();
  ctx.moveTo(bx-12,bcy-44);
  ctx.bezierCurveTo(bx-14,bcy-62,bx+14,bcy-62,bx+12,bcy-44);
  ctx.fillStyle='#e02850';ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.8)';
  [[-5,-54],[4,-57],[8,-50],[-2,-48],[5,-46],[-8,-50]].forEach(([sx,sy])=>{
    ctx.beginPath();ctx.arc(bx+sx,bcy+sy,1.3,0,Math.PI*2);ctx.fill();
  });
  ctx.fillStyle='#2a8a20';
  ctx.beginPath();ctx.ellipse(bx-4,bcy-62,5,3,Math.PI*-0.4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(bx+4,bcy-62,5,3,Math.PI*0.4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(bx,bcy-63,3,0,Math.PI*2);ctx.fill();

  ctx.restore();
}

function drawItem(it){
  ctx.save();
  ctx.globalAlpha=it.type==='obs'?0.18:0.14;
  ctx.beginPath();ctx.arc(it.x,it.y,it.r+8,0,Math.PI*2);
  ctx.fillStyle=it.type==='obs'?'#ff4040':it.color;
  ctx.fill();ctx.restore();
  ctx.beginPath();ctx.arc(it.x,it.y,it.r+3,0,Math.PI*2);
  ctx.strokeStyle=it.type==='obs'?'rgba(220,60,60,0.4)':'rgba(212,83,126,0.3)';
  ctx.lineWidth=1.5;ctx.stroke();
  ctx.font=(it.type==='obs'?'32px':'28px')+' serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  const w=Math.sin(frameCount*0.08+it.wobble)*2;
  ctx.fillText(it.emoji,it.x,it.y+w);
}

function spawnParticles(x,y,color,count=8){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const spd=2+Math.random()*4;
    particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-2,life:1,color,r:3+Math.random()*5});
  }
}

function updateUI(){
  document.getElementById('sc').textContent=score;
  document.getElementById('hi').textContent=hiScore;
  document.getElementById('lv').textContent=level;
}

function updateTimerBar(){
  const pct=Math.max(0,timeLeft/STAGE_TIME*100);
  const bar=document.getElementById('timer-bar');
  bar.style.width=pct+'%';
  if(pct>50) bar.style.background='linear-gradient(90deg,#f9a8c9,#ff6fa8)';
  else if(pct>25) bar.style.background='linear-gradient(90deg,#f7c5a0,#ff9a00)';
  else bar.style.background='linear-gradient(90deg,#e24b4a,#ff2020)';
}

function showLevelUp(lv){
  const el=document.getElementById('lvMsg');
  el.textContent=lv>MAX_LEVEL?'🏆 완주!':'🍓 레벨 '+lv+'!';
  el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',900);
}

const PLAYER_HIT=18;

function gameLoop(ts){
  frameCount++;
  if(timerActive&&lastTime>0){
    const dt=(ts-lastTime)/1000;
    timeLeft=Math.max(0,timeLeft-dt);
    updateTimerBar();
    if(timeLeft<=0){
      if(level>=MAX_LEVEL){endGame(true);return;}
      level++;speed=getLevelSpeed(level);spawnRate=getLevelSpawn(level);
      timeLeft=STAGE_TIME;items=[];showLevelUp(level);updateUI();
    }
  }
  lastTime=ts;
  ctx.clearRect(0,0,W,H);
  drawBg();

  if(keys['ArrowLeft'])player.vx=-5.5;
  if(keys['ArrowRight'])player.vx=5.5;
  player.x+=player.vx;
  player.x=Math.max(22,Math.min(W-22,player.x));
  player.bounce+=0.1;

  if(frameCount%spawnRate===0)spawnItem();

  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    it.y+=it.speed;
    if(it.y>H+40){items.splice(i,1);continue;}
    const dx=it.x-player.x,dy=it.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<it.r+PLAYER_HIT){
      if(it.type==='dessert'){
        score+=it.pts;spawnParticles(it.x,it.y,it.color,12);
        items.splice(i,1);updateUI();
      } else {
        spawnParticles(player.x,player.y,'#ff4040',20);
        endGame(false);return;
      }
      continue;
    }
    drawItem(it);
  }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.035;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=p.life;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.fill();ctx.restore();
  }

  drawBaby(player.x,player.y,player.bounce);

  if(score>hiScore){hiScore=score;document.getElementById('hi').textContent=hiScore;}
  raf=requestAnimationFrame(gameLoop);
}

function endGame(cleared){
  cancelAnimationFrame(raf);timerActive=false;state='idle';
  setTimeout(()=>{
    const ov=document.getElementById('overlay');
    ov.style.display='flex';
    ov.querySelector('h2').textContent=cleared?'🏆 완주!':'💔 게임 오버!';
    ov.querySelector('p').textContent=cleared?'17단계를 모두 클리어했어요!':'장애물에 부딪혔어요!';
    document.getElementById('endStats').innerHTML=`점수: <b style="color:#d4537e">${score}점</b> &nbsp;|&nbsp; 최고: ${hiScore}점<br>도달 레벨: ${level} / ${MAX_LEVEL}`;
    document.getElementById('startBtn').textContent='다시 하기';
  },400);
}

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('overlay').style.display='none';
  initGame();state='play';lastTime=0;
  raf=requestAnimationFrame(ts=>{lastTime=ts;raf=requestAnimationFrame(gameLoop);});
});
</script>
</body>
</html>
