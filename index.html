<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#2d1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Apple SD Gothic Neo',sans-serif;overflow:hidden}
#wrap{position:relative;width:340px}
#score-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 4px;font-size:14px;color:#f9c8e0}
#score-bar span{font-weight:700;color:#fff}
canvas{display:block;border-radius:24px;border:2px solid #6a2a5a;background:#1e0a20}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:24px;background:rgba(30,10,32,0.93)}
#overlay h2{font-size:28px;color:#f9a8c9;margin-bottom:8px}
#overlay p{font-size:14px;color:#d090b0;margin-bottom:20px;text-align:center;line-height:1.7}
#overlay .hi{font-size:13px;color:#a06080;margin-bottom:16px}
#startBtn{background:#d4537e;color:#fff;border:none;border-radius:999px;padding:12px 36px;font-size:16px;cursor:pointer;font-family:inherit;transition:transform 0.1s}
#startBtn:hover{transform:scale(1.05)}
#startBtn:active{transform:scale(0.97)}
</style>
</head>
<body>
<div id="wrap">
  <div id="score-bar">
    <div>점수 <span id="sc">0</span></div>
    <div>최고 <span id="hi">0</span></div>
    <div>레벨 <span id="lv">1</span></div>
  </div>
  <canvas id="c" width="340" height="480"></canvas>
  <div id="overlay">
    <h2>🫧 마카롱 런</h2>
    <p>디저트를 먹고 장애물을 피하세요!<br>← → 키 또는 화면 터치로 이동</p>
    <div class="hi">최고기록 <span id="hiDisp">0</span>점</div>
    <button id="startBtn">시작하기</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 340, H = 480;
let raf, state = 'idle';
let score = 0, hiScore = 0, level = 1;
let player, items, particles;
let frameCount = 0;
let spawnRate = 80;
let speed = 2.5;
let keys = {};

let touchStartX = null;
canvas.addEventListener('touchstart', e=>{touchStartX=e.touches[0].clientX;e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove', e=>{
  if(touchStartX===null) return;
  const dx = e.touches[0].clientX - touchStartX;
  if(Math.abs(dx)>10){player.vx = dx>0?5:-5; touchStartX=e.touches[0].clientX;}
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',()=>{player.vx=0;touchStartX=null;});
window.addEventListener('keydown',e=>{keys[e.key]=true});
window.addEventListener('keyup',e=>{keys[e.key]=false;if(!keys['ArrowLeft']&&!keys['ArrowRight'])player.vx=0;});

const DESSERTS = [
  {emoji:'🍬',pts:5,color:'#f9a8c9'},
  {emoji:'🍪',pts:8,color:'#f7c5a0'},
  {emoji:'🍰',pts:15,color:'#f4c0d1'},
  {emoji:'🍫',pts:10,color:'#c8a06a'},
  {emoji:'🧁',pts:20,color:'#f9c8e0'},
  {emoji:'🍭',pts:12,color:'#aee8d0'},
];
const OBSTACLES = [
  {emoji:'🥦',color:'#7dc97d'},
  {emoji:'🌶️',color:'#e24b4a'},
  {emoji:'🧅',color:'#f7c5a0'},
];

function initGame(){
  score=0; level=1; frameCount=0; spawnRate=80; speed=2.5;
  player={x:W/2,y:H-70,r:26,vx:0,bounce:0};
  items=[]; particles=[];
  updateUI();
}

function spawnItem(){
  const isObstacle = Math.random()<0.28;
  const x = 30+Math.random()*(W-60);
  if(isObstacle){
    const o = OBSTACLES[Math.floor(Math.random()*OBSTACLES.length)];
    items.push({x,y:-30,r:22,type:'obs',emoji:o.emoji,color:o.color,speed:speed*0.9,wobble:Math.random()*Math.PI*2});
  } else {
    const d = DESSERTS[Math.floor(Math.random()*DESSERTS.length)];
    items.push({x,y:-30,r:20,type:'dessert',emoji:d.emoji,pts:d.pts,color:d.color,speed,wobble:Math.random()*Math.PI*2});
  }
}

function drawMacaron(x,y,r,bounce){
  const by = Math.sin(bounce)*3;
  // glow
  const grd = ctx.createRadialGradient(x,y+by,r*0.2,x,y+by,r*1.8);
  grd.addColorStop(0,'rgba(249,168,201,0.25)');
  grd.addColorStop(1,'rgba(249,168,201,0)');
  ctx.beginPath();ctx.arc(x,y+by,r*1.8,0,Math.PI*2);
  ctx.fillStyle=grd;ctx.fill();

  // shadow
  ctx.save();ctx.globalAlpha=0.35;
  ctx.beginPath();ctx.ellipse(x,y+r+2+by,r*0.75,6,0,0,Math.PI*2);
  ctx.fillStyle='#000';ctx.fill();ctx.restore();

  // bottom layer
  ctx.beginPath();ctx.ellipse(x,y+7+by,r,r*0.52,0,0,Math.PI*2);
  ctx.fillStyle='#e8709a';ctx.fill();
  ctx.strokeStyle='#c0507a';ctx.lineWidth=1.5;ctx.stroke();

  // cream
  ctx.beginPath();ctx.ellipse(x,y+2+by,r*1.08,8,0,0,Math.PI*2);
  ctx.fillStyle='#fff0f8';ctx.fill();
  ctx.strokeStyle='#f0c0d8';ctx.lineWidth=1;ctx.stroke();

  // top layer
  ctx.beginPath();ctx.ellipse(x,y-7+by,r,r*0.52,0,0,Math.PI*2);
  ctx.fillStyle='#ff9ec5';ctx.fill();
  ctx.strokeStyle='#e070a0';ctx.lineWidth=1.5;ctx.stroke();

  // shine
  ctx.beginPath();ctx.ellipse(x-r*0.3,y-11+by,r*0.2,r*0.13,Math.PI*-0.3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.75)';ctx.fill();

  // eyes
  ctx.fillStyle='#8a2060';
  ctx.beginPath();ctx.arc(x-7,y-7+by,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+7,y-7+by,3,0,Math.PI*2);ctx.fill();
  // eye shine
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(x-6,y-8+by,1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+8,y-8+by,1,0,Math.PI*2);ctx.fill();

  // smile
  ctx.beginPath();ctx.arc(x,y-3+by,6,0.25,Math.PI-0.25);
  ctx.strokeStyle='#8a2060';ctx.lineWidth=2;ctx.stroke();

  // cheeks
  ctx.save();ctx.globalAlpha=0.35;
  ctx.fillStyle='#ff6090';
  ctx.beginPath();ctx.ellipse(x-r*0.6,y-2+by,5,3,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+r*0.6,y-2+by,5,3,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawItem(it){
  // glow bg circle
  ctx.save();
  ctx.globalAlpha = it.type==='obs' ? 0.25 : 0.2;
  ctx.beginPath();ctx.arc(it.x,it.y,it.r+10,0,Math.PI*2);
  ctx.fillStyle = it.type==='obs' ? '#ff4040' : it.color;
  ctx.fill();
  ctx.restore();

  // border circle
  ctx.beginPath();ctx.arc(it.x,it.y,it.r+4,0,Math.PI*2);
  ctx.strokeStyle = it.type==='obs' ? 'rgba(255,80,80,0.5)' : 'rgba(255,200,220,0.4)';
  ctx.lineWidth=2;ctx.stroke();

  // emoji
  ctx.font = it.type==='obs' ? '36px serif' : '32px serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  const w = Math.sin(frameCount*0.08+it.wobble)*2;
  ctx.fillText(it.emoji, it.x, it.y+w);
}

function drawBg(){
  // stars
  ctx.fillStyle='rgba(255,200,230,0.15)';
  for(let i=0;i<30;i++){
    const sx=(i*137+50)%W, sy=(i*97+30)%H;
    const pulse = 0.5+0.5*Math.sin(frameCount*0.04+i);
    ctx.globalAlpha=pulse*0.4;
    ctx.beginPath();ctx.arc(sx,sy,1.5,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // ground line
  ctx.beginPath();ctx.moveTo(0,H-40);ctx.lineTo(W,H-40);
  ctx.strokeStyle='rgba(180,80,130,0.25)';ctx.lineWidth=1;ctx.stroke();
}

function spawnParticles(x,y,color,count=8){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const spd=2+Math.random()*4;
    particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-2,life:1,color,r:3+Math.random()*5});
  }
}

function updateUI(){
  document.getElementById('sc').textContent=score;
  document.getElementById('hi').textContent=hiScore;
  document.getElementById('lv').textContent=level;
}

function gameLoop(){
  frameCount++;
  ctx.clearRect(0,0,W,H);
  drawBg();

  if(keys['ArrowLeft'])player.vx=-5;
  if(keys['ArrowRight'])player.vx=5;
  player.x+=player.vx;
  player.x=Math.max(player.r,Math.min(W-player.r,player.x));
  player.bounce+=0.1;

  if(frameCount%spawnRate===0) spawnItem();

  const newLevel=1+Math.floor(score/80);
  if(newLevel>level){
    level=newLevel;
    speed=2.5+level*0.5;
    spawnRate=Math.max(30,80-level*8);
    updateUI();
  }

  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    it.y+=it.speed;
    if(it.y>H+40){items.splice(i,1);continue;}
    const dx=it.x-player.x, dy=it.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<it.r+player.r-8){
      if(it.type==='dessert'){
        score+=it.pts;
        spawnParticles(it.x,it.y,it.color,12);
        items.splice(i,1);
        updateUI();
      } else {
        spawnParticles(player.x,player.y,'#ff4040',20);
        endGame();return;
      }
      continue;
    }
    drawItem(it);
  }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=0.035;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=p.life;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.fill();ctx.restore();
  }

  drawMacaron(player.x,player.y,player.r,player.bounce);

  if(score>hiScore){hiScore=score;document.getElementById('hi').textContent=hiScore;document.getElementById('hiDisp').textContent=hiScore;}

  raf=requestAnimationFrame(gameLoop);
}

function endGame(){
  cancelAnimationFrame(raf);
  state='idle';
  setTimeout(()=>{
    const ov=document.getElementById('overlay');
    ov.style.display='flex';
    ov.querySelector('h2').textContent='💔 게임 오버!';
    ov.querySelector('p').innerHTML=`점수: <b style="color:#f9a8c9">${score}점</b><br>최고기록: ${hiScore}점`;
    document.getElementById('startBtn').textContent='다시 하기';
  },400);
}

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('overlay').style.display='none';
  initGame();
  state='play';
  raf=requestAnimationFrame(gameLoop);
});
document.getElementById('hiDisp').textContent=hiScore;
</script>
</body>
</html>
